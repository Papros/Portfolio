<div class="doc-article-container">
  <div class="doc-article-content">
    <ng-container *ngIf="docApi.inputs.length > 0">
      <h3 class="api-section-title">Inputs</h3>
      <div class="table-wrapper" id="inputs">
        <table mat-table [dataSource]="docApi.inputs">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let element">
              <span class="prop-name">{{ element.name }}</span>
              <span class="prop-type">: {{ element.type }}</span>
              <span class="prop-default" *ngIf="element.defaultValue">
                = {{ element.defaultValue }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="desc">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let element">
              {{ element.description }}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="['name', 'desc']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['name', 'desc']"></tr>
        </table>
      </div>
    </ng-container>

    <ng-container *ngIf="docApi.outputs.length > 0">
      <h3 class="api-section-title">Outputs</h3>
      <div class="table-wrapper" id="outputs">
        <table mat-table [dataSource]="docApi.outputs">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let element">
              <span class="prop-name">{{ element.name }}</span>
              <span class="prop-type">: {{ element.type }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="desc">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let element">
              {{ element.description }}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="['name', 'desc']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['name', 'desc']"></tr>
        </table>
      </div>
    </ng-container>
  </div>

  <lib-content-list
    [sections]="[
      { id: 'inputs', title: 'Inputs' },
      { id: 'outputs', title: 'Outputs' },
    ]"
  ></lib-content-list>
</div>
