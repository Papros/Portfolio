<ng-container *ngIf="doc; else notFound">
  <mat-tab-group mat-stretch-tabs="false">
    <mat-tab label="Overview">
      <lib-component-overview
        [componentId]="doc.id"
        [overview]="doc.overview"
      ></lib-component-overview>
    </mat-tab>

    <mat-tab label="API">
      <lib-component-api [componentId]="doc.id" [docApi]="doc.api">
      </lib-component-api>
    </mat-tab>

    <mat-tab label="Examples">
      <lib-component-example
        [componentId]="doc.id"
        [examples]="doc.examples"
      ></lib-component-example>
    </mat-tab>
  </mat-tab-group>
</ng-container>

<!-- #LandingPage fallback content for missing component details -->
<ng-template #notFound>
  <p>Component not found.</p>
</ng-template>
