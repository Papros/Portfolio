<ng-container *ngIf="doc() as component; else notFound">
  <mat-tab-group mat-stretch-tabs="false">
    <mat-tab label="Overview">
      <lib-component-overview
        [componentId]="component.meta.id"
        [overview]="component.overview"
      ></lib-component-overview>
    </mat-tab>

    <mat-tab label="API">
      <lib-component-api [componentId]="component.meta.id" [docApi]="component.api">
      </lib-component-api>
    </mat-tab>

    <mat-tab label="Examples">
      <lib-component-example
        [componentId]="component.meta.id"
        [examples]="component.examples"
      ></lib-component-example>
    </mat-tab>
  </mat-tab-group>
</ng-container>

<!-- #LandingPage fallback content for missing component details -->
<ng-template #notFound>
  <p>Component not found.</p>
</ng-template>
