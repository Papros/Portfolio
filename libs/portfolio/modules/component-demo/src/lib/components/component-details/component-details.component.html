<ng-container *ngIf="doc$ | async as doc; else notFound">
  <mat-tab-group>
    <mat-tab label="Overview">
      <h1>{{ doc.title }}</h1>
      <p>{{ doc.description }}</p>
    </mat-tab>

    <mat-tab label="API">
      <!-- <lib-api-table
        [inputs]="doc.api.inputs"
        [outputs]="doc.api.outputs"
      ></lib-api-table> -->
    </mat-tab>

    <mat-tab label="Examples">
      <!-- <lib-example-host
        *ngFor="let example of doc.examples"
        [example]="example"
      ></lib-example-host> -->
    </mat-tab>
  </mat-tab-group>
</ng-container>

<ng-template #notFound>
  <p>Component not found.</p>
</ng-template>
