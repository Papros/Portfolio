<lib-navigation-bar
  data-section="design-system"
  [actions]="navigationActions"
  (actionClick)="onNavigationAction($event)"
></lib-navigation-bar>

<div class="page-layout" data-section="design-system">
  <mat-drawer-container class="component-demo-drawer" autosize>
    <mat-drawer
      #drawer
      class="component-demo-sidenav"
      [mode]="isMobile ? 'over' : 'side'"
      [opened]="!isMobile"
    >
      <lib-simple-menu [actions]="componentMenuList"></lib-simple-menu>
    </mat-drawer>

    <mat-drawer-content class="component-demo-content">
      <router-outlet></router-outlet>
    </mat-drawer-content>
  </mat-drawer-container>

  <footer class="component-demo-footer">
    <div class="footer-option">
      <a href="/Portfolio/menu">
        <mat-icon>arrow_left</mat-icon> Back to menu</a
      >
    </div>
    <div class="footer-option--center">
      &copy; {{ currentYear }}
      Piotr Papros. All rights reserved.
    </div>
  </footer>
</div>
