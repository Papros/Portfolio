<div class="doc-article-container">
  <div class="doc-article-content">
    @for (section of overview?.sections; track section.id) {
      <lib-article-section
        [componentId]="componentId"
        [section]="section"
      ></lib-article-section>
    }
  </div>

  <div class="sticky-container">
    <lib-content-list [sections]="overview?.sections"></lib-content-list>
  </div>
</div>
