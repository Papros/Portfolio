<div class="snackbar" [class]="'snackbar--' + data.type">
  <mat-icon class="snackbar__icon" fontSet="material-icons-outlined">
    {{ icon() }}
  </mat-icon>

  <span class="snackbar__message">{{ data.message }}</span>

  <div class="snackbar__actions">
    @for (action of data.actions; track action.id) {
      <button class="snackbar__action-btn" (click)="onAction(action.id)">
        {{ action.label }}
      </button>
    }
    <button class="snackbar__close" (click)="dismiss()">
      <mat-icon fontSet="material-icons-outlined">close</mat-icon>
    </button>
  </div>
</div>
