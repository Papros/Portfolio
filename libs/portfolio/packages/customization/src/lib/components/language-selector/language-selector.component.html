<pipr-multistate-slider
  *transloco="let t"
  matTooltipClass="lib-tooltip"
  [matTooltip]="t('shared.ui.select-language-tooltip')"
  [value]="activeLang"
  [config]="sliderConfig"
  (valueChange)="onLanguageChange($event)"
>
  <pipr-slider-option value="en"> EN </pipr-slider-option>

  <pipr-slider-option value="pl"> PL </pipr-slider-option>
</pipr-multistate-slider>
