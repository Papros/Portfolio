<mat-toolbar [class.sticky-toolbar]="isSticky">
  <div class="action-container">
    @for (action of actions; track action.id) {
      <button
        matIconButton
        [class]="'toolbar-action-icon ' + (action.cssClass || '')"
        (click)="actionClick.emit(action.id)"
        [routerLink]="action.routerLink ? [action.routerLink] : null"
        routerLinkActive="toolbar-action-icon--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon *ngIf="action.icon">{{ action.icon }}</mat-icon>
        <span *ngIf="action.label">{{ action?.label }}</span>
      </button>
    }
  </div>

  <div class="navigation-container">
    <ng-content />
  </div>
</mat-toolbar>
