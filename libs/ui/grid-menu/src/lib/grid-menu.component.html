<div
  class="custom-grid"
  [style.--grid-cols]="menuConfig.gridWidth"
  [style.--grid-rows]="menuConfig.gridHeight"
>
  <div
    *ngFor="let item of menuConfig.items"
    class="grid-tile"
    [class.tile-enabled]="item.options.enabled"
    [class.tile-disabled]="!item.options.enabled"
    [style]="getItemStyle(item)"
  >
    <ng-container *ngIf="getSlotTemplate(item.id) as tpl; else fallback">
      <ng-container *ngTemplateOutlet="tpl"></ng-container>
    </ng-container>

    <ng-template #fallback>
      <span
        [style.textShadow]="
          item.label.shadow ? '1px 1px 2px rgba(0,0,0,0.5)' : 'none'
        "
        [style.alignSelf]="mapVertical(item.label.positionVertical)"
        [style.justifySelf]="mapHorizontal(item.label.positionHorizontal)"
      >
        {{ item.label.value }}
      </span>
    </ng-template>
  </div>
</div>
