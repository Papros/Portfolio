<div
  class="overlay-menu-container"
  [class.open]="isMenuOpen()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
  [style.--radius.px]="radius"
  [style.--spread.deg]="spread"
>
  <div class="menu-center" (click)="toggle()">
    <mat-icon svgIcon="compass-glowing"></mat-icon>
  </div>

  @for (option of options; track option.id; let i = $index) {
    <div
      class="menu-option"
      [style.--i]="i"
      [style.--total]="options.length"
      (click)="selectOption(option)"
    >
      <mat-icon fontSet="material-icons-outlined">{{ option.icon }}</mat-icon>
    </div>
  }
</div>
