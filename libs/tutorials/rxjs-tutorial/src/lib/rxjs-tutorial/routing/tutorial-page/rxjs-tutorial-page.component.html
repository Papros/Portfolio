<div class="rxjs-page">
  <nav class="top-nav">
    <a class="nav-back" href="/Portfolio/tutorials">← Tutorials</a>

    <div class="challenge-nav">
      <button
        class="nav-btn"
        [disabled]="!hasPrev"
        (click)="goTo(currentIndex()! - 1)"
      >
        ‹
      </button>

      <div class="challenge-dots">
        @for (ch of challenges; track ch.id; let i = $index) {
          <button
            class="dot"
            [class.is-active]="i === currentIndex()"
            [title]="ch.title"
            (click)="goTo(i)"
          ></button>
        }
      </div>

      <button
        class="nav-btn"
        [disabled]="!hasNext"
        (click)="goTo(currentIndex()! + 1)"
      >
        ›
      </button>
    </div>
  </nav>

  <div class="challenge-area">
    <lib-challenge-container [initChallenge]="challenge()!" />
  </div>
</div>
