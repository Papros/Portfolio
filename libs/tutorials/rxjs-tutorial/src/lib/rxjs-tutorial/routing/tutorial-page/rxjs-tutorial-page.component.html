<div class="rxjs-page">
  <nav class="top-nav">
    <a class="nav-back" href="/Portfolio/tutorials">← Tutorials</a>

    <div class="challenge-nav">
      <button
        class="nav-btn"
        [disabled]="!hasPrev"
        (click)="goTo(meta().prev!.id)"
      >
        ‹
      </button>

      <div class="challenge-dots">
        @for (ch of challenges; track ch.id) {
          <button
            class="dot"
            [class.is-active]="ch.id === challenge()?.id"
            [title]="ch.title"
            (click)="goTo(ch.id)"
          ></button>
        }
      </div>

      <button
        class="nav-btn"
        [disabled]="!hasNext"
        (click)="goTo(meta().next!.id)"
      >
        ›
      </button>
    </div>
  </nav>

  <div class="challenge-area">
    <lib-challenge-container
      [initChallenge]="challenge()!"
      [nextChallenge]="meta().next"
      [prevChallenge]="meta().prev"
      (navigateChallenge)="goTo($event)"
    />
  </div>
</div>
