<div
  class="track-wrapper"
  [class.--locked]="locked()"
  [class.--focused]="isFocused()"
  (click)="onTrackClick()"
>
  <span class="track-label">{{ trackData().label }}</span>
  <div class="track-line-area" #trackArea (click)="onTrackAreaClick($event)">
    <div class="track-line"></div>
    <div class="track-arrow"></div>

    @for (tick of ticks; track tick) {
      <div class="tick" [style.left.%]="tick"></div>
    }

    @for (
      event of trackData().stream;
      track event.timeInterval;
      let i = $index
    ) {
      <div
        class="marble"
        [class.--next]="event.type === 'next'"
        [class.--error]="event.type === 'error'"
        [class.--complete]="event.type === 'complete'"
        [class.--active]="event.timeInterval <= simulatedTime()"
        [class.--focused]="focusedMarbleIndex() === i"
        [style.left.%]="calcPosition(event.timeInterval)"
        [title]="event.label"
        (click)="onMarbleClick($event, i)"
        (mousedown)="onMarbleDragStart($event, i)"
      >
        @if (event.type === 'complete') {
          <span class="complete-bar"></span>
        } @else {
          {{ event.label }}
        }
      </div>
    }

    @if (trackData().completeTime !== null) {
      <div
        class="complete-marker"
        [class.--active]="trackData().completeTime! <= simulatedTime()"
        [style.left.%]="calcPosition(trackData().completeTime!)"
      ></div>
    }
  </div>
</div>
